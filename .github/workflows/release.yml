name: Build Cruft Executables

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Enable Windows long paths via registry
        run: reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
        shell: cmd

      - name: Configure git for long paths
        run: git config --system core.longpaths true
        shell: cmd

      - name: Create short source and target directories
        run: |
          New-Item -ItemType Directory -Force C:\s | Out-Null
          New-Item -ItemType Directory -Force C:\ct | Out-Null
        shell: pwsh

      - name: Redirect cargo target to short path
        run: echo "CARGO_TARGET_DIR=C:\ct" >> $env:GITHUB_ENV
        shell: pwsh

      - uses: actions/checkout@v4
        with:
          path: C:\s

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$env:LLVM_PATH\bin" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            C:\ct
          key: windows-${{ hashFiles('C:/s/**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: C:\s

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: cruft-windows
          path: C:\ct\x86_64-pc-windows-msvc\release\cruft-crawler.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            clang \
            libclang-dev \
            llvm \
            pkg-config \
            libssl-dev

